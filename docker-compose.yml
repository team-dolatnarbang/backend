services:
  db:
    image: postgres:16
    container_name: groomthon-postgres
    environment:
      POSTGRES_DB: groomthon
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - groomthon_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d groomthon"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  groomthon_pgdata:
